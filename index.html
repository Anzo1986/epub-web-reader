<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e">
    <title>Web EPUB Reader</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <link rel="stylesheet" href="./style.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --panel: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --text: #f8fafc;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* Fix for Google Translate top bar */
        body { top: 0 !important; }
        .skiptranslate { display: none !important; }

        /* V41: The V1 Rebirth (Pristine Fullscreen) */
        .viewer-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            left: 0;
            right: 0;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header { top: 0; padding: 15px 20px; border-radius: 0 0 20px 20px; }
        .controls { bottom: 0; padding: 15px 20px; border-radius: 20px 20px 0 0; display: flex; align-items: center; justify-content: space-between; }

        .hidden-ui .slide-down { transform: translateY(-110%); }
        .hidden-ui .slide-up { transform: translateY(110%); }
    </style>

    <!-- EPUB.js and dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body>
    <script>
        // V41: The V1 Rebirth
        const VERSION = 'v41.0';
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let r of registrations) {
                    if (!r.active || !r.active.scriptURL.includes(VERSION)) {
                        console.log('Force-Kill old SW:', r.active ? r.active.scriptURL : 'pending');
                        r.unregister().then(() => console.log('SW Killed.'));
                    }
                }
            });
            caches.keys().then(names => {
                for (let name of names) {
                    if (!name.includes(VERSION)) caches.delete(name);
                }
            });
        }
    </script>
    
    <!-- UI Overlay (Auto-hides when tapping middle of screen) -->
    <header id="header" class="glass-panel slide-down">
        <div class="header-content">
            <h1>EPUB Reader</h1>
            <div style="display:flex; gap:10px; align-items:center;">
                <!-- TTS Controls -->
                <select id="tts-speed" class="upload-btn" style="background-color: transparent ; border: 1px solid var(--accent); padding: 5px;">
                    <option value="0.8">0.8x</option>
                    <option value="1.0" selected>1.0x</option>
                    <option value="1.2">1.2x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2.0">2.0x</option>
                </select>
                <div class="header-controls">
                    <span id="version-tag" style="font-size: 0.7rem; opacity: 0.6; margin-right: 10px;">v41.0</span>
                    <button id="tts-trigger" class="upload-btn" style="background-color: var(--accent);">🔊 Vorlesen</button>
                </div>

                <!-- Custom Button that will trigger the Google Translate dropdown -->
                <button id="translate-trigger" class="upload-btn" style="background-color: var(--success); border-color: var(--success);">🌍 Übersetzen</button>
                <div id="google_translate_element" style="display:none;"></div>
                
                <label for="book-upload" class="upload-btn">📚 Laden</label>
                <input type="file" id="book-upload" accept=".epub" style="display: none;">
            </div>
        </div>
    </header>

    <!-- Reading Area -->
    <div id="viewer" class="viewer-container"></div>

    <!-- Pagination Controls Overlay -->
    <div id="controls" class="controls glass-panel slide-up">
        <button id="prev-btn" class="nav-btn">Zurück</button>
        <span id="page-info">Seite --</span>
        <button id="next-btn" class="nav-btn">Weiter</button>
    </div>

    <!-- Hidden Translation Trigger (For PWA) -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'de',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <script src="./app.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=41.0').then(registration => {
                    console.log('V41 SW registered');
                });
            });
        }
    </script>  </script>
</body>
</html>
